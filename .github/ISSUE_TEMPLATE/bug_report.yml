name: Bug
description: Something in redbar doesn't do what it should
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you expected, and what came instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: |
        The exact command and, if you can, a real repo or a small fixture. A fixture tests what you
        already imagined; a real repo tests what nobody imagined — that's where redbar's bugs show up.
      placeholder: |
        1. cd /my/repo
        2. redbar i
        3. ...
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Output of `redbar --version`, `node --version`, and the OS.
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output
      description: Paste the error or the whole report. It's deterministic — the raw output helps.
      render: shell
