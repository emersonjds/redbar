name: Idea
description: A language, an MCP client, a behavior
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What pain does this solve
      description: Start with the problem, not the solution. What's the gap today?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: |
        If you're adding a language, an agent, or an MCP client, remember: in redbar that's one row of
        data in a table (`src/languages.ts`, `src/agents.ts`, `src/clients.ts`), not new code. Describe
        the row.
    validations:
      required: true
  - type: checkboxes
    id: rules
    attributes:
      label: Does it fit the design?
      options:
        - label: It asks for no new runtime dependency (redbar has zero, on purpose)
        - label: It puts no AI model in the analysis path
